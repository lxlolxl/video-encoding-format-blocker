name: Package extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-package
          path: dist/*.zip
